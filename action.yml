name: 'Speciesist Language Scanner (reviewdog)'
description: 'Run speciesist language checks and report results via reviewdog'
author: 'Open Paws'
branding:
  icon: 'heart'
  color: 'green'

inputs:
  github_token:
    description: 'GITHUB_TOKEN'
    required: true
    default: ${{ github.token }}
  level:
    description: 'Report level for reviewdog (info, warning, error)'
    required: false
    default: 'warning'
  reporter:
    description: 'Reporter for reviewdog (github-pr-check, github-pr-review, github-check)'
    required: false
    default: 'github-pr-review'
  filter_mode:
    description: 'Filtering mode for reviewdog (added, diff_context, file, nofilter)'
    required: false
    default: 'added'

runs:
  using: 'composite'
  steps:
    - uses: reviewdog/action-setup@v1

    - name: Install speciesist language checker
      shell: bash
      run: pip install https://github.com/Open-Paws/speciesist-language-pre-commit/archive/refs/tags/v0.1.0.tar.gz

    - name: Run speciesist language check with reviewdog
      shell: bash
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
      run: |
        find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.md" -o -name "*.txt" -o -name "*.rst" -o -name "*.yaml" -o -name "*.yml" -o -name "*.go" -o -name "*.rs" -o -name "*.java" -o -name "*.rb" \) \
          -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./vendor/*" \
          -exec speciesist-language-check {} + 2>&1 \
          | reviewdog -efm="%f:%l: %m" -name="speciesist-language" -reporter=${{ inputs.reporter }} -level=${{ inputs.level }} -filter-mode=${{ inputs.filter_mode }}
