name: Desloppify Quality Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality Gate (score >= 70)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache desloppify install
        id: cache-desloppify
        uses: actions/cache@v4
        with:
          path: /tmp/desloppify
          key: desloppify-${{ runner.os }}-${{ hashFiles('.github/workflows/desloppify.yml') }}

      - name: Clone desloppify
        if: steps.cache-desloppify.outputs.cache-hit != 'true'
        run: |
          git clone --no-recurse-submodules https://github.com/Open-Paws/desloppify.git /tmp/desloppify

      - name: Install desloppify
        run: pip install "/tmp/desloppify[full]"

      - name: Run quality gate (diff mode)
        run: |
          SCAN_PATH="."
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_REF" ]; then
            echo "No PR base SHA (workflow_dispatch?) — diffing against HEAD~1"
            BASE_REF="HEAD~1"
          fi

          # Measure base score in an isolated worktree so the working tree is untouched.
          # Run scan and status from within the worktree directory — desloppify may store
          # state relative to the scanned path.
          WORKTREE_DIR=/tmp/base-score
          trap 'git worktree remove --force "$WORKTREE_DIR" >/dev/null 2>&1 || true' EXIT
          git worktree add --detach "$WORKTREE_DIR" "$BASE_REF"
          BASE_SCORE=$(
            cd "$WORKTREE_DIR"
            desloppify scan --path . --profile ci --no-badge > /dev/null 2>&1 || true
            STATUS=$(desloppify status --json 2>&1)
            SCORE=$(echo "$STATUS" | jq -r '.verified_strict_score // .strict_score // empty')
            if [ -z "$SCORE" ] || [ "$SCORE" = "null" ]; then
              SCORE=$(echo "$STATUS" | jq -r '.overall_score // .score // empty')
            fi
            if [ -z "$SCORE" ] || [ "$SCORE" = "null" ]; then
              echo "ERROR: could not extract base score" >&2
              echo "$STATUS" | head -50 >&2
              exit 1
            fi
            echo "$SCORE"
          )
          git worktree remove --force "$WORKTREE_DIR"
          trap - EXIT

          # Measure head score in the current working tree.
          desloppify scan --path "${SCAN_PATH}" --profile ci --no-badge > /dev/null 2>&1 || true
          STATUS=$(desloppify status --json 2>&1)
          HEAD_SCORE=$(echo "$STATUS" | jq -r '.verified_strict_score // .strict_score // empty')
          if [ -z "$HEAD_SCORE" ] || [ "$HEAD_SCORE" = "null" ]; then
            HEAD_SCORE=$(echo "$STATUS" | jq -r '.overall_score // .score // empty')
          fi
          if [ -z "$HEAD_SCORE" ] || [ "$HEAD_SCORE" = "null" ]; then
            echo "ERROR: could not extract head score"
            echo "$STATUS" | head -50
            exit 1
          fi

          echo "Base score: ${BASE_SCORE}/100"
          echo "Head score: ${HEAD_SCORE}/100"

          python3 -c "
          base = float('${BASE_SCORE}')
          head = float('${HEAD_SCORE}')
          if head < base:
              print(f'FAIL: score dropped from {base} to {head} (new violations introduced)')
              raise SystemExit(1)
          print(f'PASS: score {head} >= base {base}')
          "

          {
            echo "## Desloppify Quality Gate"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Base score | **${BASE_SCORE}/100** |"
            echo "| Head score | **${HEAD_SCORE}/100** |"
            echo "| Scan path | \`${SCAN_PATH}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
